<!DOCTYPE html>
<html lang="zh-CN">
  <!-- MOOV OS v2.0 - Theme: Blue #004F7C + Orange #FE5000 -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#004F7C" />
    <link rel="icon" type="image/png" href="https://conversation.cdn.meoo.host/conversations/311090703507873792/image/2026-07-01/1782893331989-MOOV_Icon_白橙配色图标.png?auth_key=3ddf0755194a3a17fa345e58f6772997695fa0d67d9de7cfa419a103a24739bd&v=2" />
    <title>MOOV OS v2.0</title>
    <style>
      /* 内联样式确保主题色立即生效，避免闪烁 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      html.light, html.light body {
        background-color: oklch(0.98 0.005 240) !important;
        color: oklch(0.15 0.02 260);
      }
      html.dark, html.dark body {
        background-color: oklch(0.15 0.02 260) !important;
        color: oklch(0.95 0.01 240);
      }
    </style>
    <script>
      // 在 React 加载前立即设置主题，避免闪烁
      (function() {
        const isInIframe = window.self !== window.top;

        function applyThemeToDOM(theme) {
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute('data-theme', theme);
        }

        if (isInIframe) {
          // 监听父窗口主动推送的主题消息
          window.addEventListener('message', function(event) {
            if (event.data && typeof event.data.theme === 'string') {
              var theme = event.data.theme;
              if (theme === 'light' || theme === 'dark') {
                applyThemeToDOM(theme);
              }
            }
          });
        } else {
          // 非 iframe 环境，使用默认 light 主题
          applyThemeToDOM('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
